name: tm-whatsapp

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tm-whatsapp-api
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tmwhatsapp?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_REGION: us-east-1
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - tm-whatsapp
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: tm-whatsapp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tmwhatsapp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tmwhatsapp"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - tm-whatsapp
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tm-whatsapp-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - tm-whatsapp
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: tm-whatsapp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tm-whatsapp
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  tm-whatsapp:
    driver: bridge
