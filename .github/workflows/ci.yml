name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Test
        run: pnpm test

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --file apps/api/Dockerfile --tag tm-whatsapp-api:test .

      - name: Validate Compose config
        run: docker compose config --quiet

      - name: Start Compose stack
        run: docker compose up --wait --wait-timeout 120

      - name: Check API liveness
        run: curl --fail http://127.0.0.1:3000/health/live

      - name: Check API readiness
        run: curl --fail http://127.0.0.1:3000/health/ready

      - name: Run Compose smoke tests
        run: ./scripts/compose-smoke.sh

      - name: Diagnostics on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --tail 50 api || true
          docker compose logs --tail 30 postgres || true
          docker compose logs --tail 30 redis || true
          docker compose logs --tail 30 minio || true

      - name: Teardown
        if: always()
        run: docker compose down --remove-orphans
